name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  

# cancel in-progress runs that use the same workflow and branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-manifest:
    # check-manifest is a tool that checks that all files in version control are
    # included in the sdist (unless explicitly excluded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: pipx run check-manifest

  test:
    name: ${{ matrix.platform }} (${{ matrix.python-version }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        platform: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Set up headless GUI
        uses: pyvista/setup-headless-display-action@v4
        with:
          qt: true

      - name: Install llvmpipe and lavapipe for offscreen canvas
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update -y -qq
          sudo apt install -y libegl1-mesa-dev libgl1-mesa-dri libxcb-xfixes0-dev mesa-vulkan-drivers 

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache-dependency-path: "pyproject.toml"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install -U pip
          python -m pip install git+https://github.com/pygfx/rendercanvas.git@main # need this for anywidget support
          python -m pip install .[test,pyside,remote,anywidget]

      # TEMPORARY: diagnosing windows-only render failures (see PR #109).
      # Remove this step once the adapter/colormap question is settled.
      - name: 🔍 wgpu adapter + colormap probe (TEMPORARY)
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          import numpy as np
          import pygfx as gfx
          import wgpu
          from cmap import Colormap
          from pygfx.renderers.wgpu import get_shared
          from rendercanvas.offscreen import RenderCanvas

          print("wgpu", wgpu.__version__, "| pygfx", gfx.__version__)

          print("--- adapters available ---")
          for a in wgpu.gpu.enumerate_adapters_sync():
              print(" *", a.summary)

          device = get_shared().device
          print("--- device pygfx chose ---")
          print("adapter:", device.adapter.summary)
          for k, v in device.adapter.info.items():
              print(f"  {k}: {v}")
          print("float32-filterable:", "float32-filterable" in device.features)
          print("features:", sorted(device.features))

          # Pure-pygfx repro of the failing colormap path (no cellier involved):
          # a 16x16 float32 image ramping 0->1 along X, viridis, clim (0, 1).
          data = np.repeat(np.linspace(0, 1, 16, dtype=np.float32)[None, :], 16, axis=0)
          cmap = Colormap("viridis").to_pygfx(N=256)
          print("--- colormap texture ---")
          print("dim:", cmap.texture.dim, "format:", cmap.texture.format)
          print("mag_filter:", cmap.mag_filter, "min_filter:", cmap.min_filter)

          image = gfx.Image(
              gfx.Geometry(grid=gfx.Texture(data, dim=2)),
              gfx.ImageBasicMaterial(clim=(0, 1), map=cmap),
          )
          scene = gfx.Scene()
          scene.add(image)
          camera = gfx.OrthographicCamera()
          camera.show_object(image)

          canvas = RenderCanvas(size=(64, 64), pixel_ratio=1)
          renderer = gfx.WgpuRenderer(canvas)
          canvas.request_draw(lambda: renderer.render(scene, camera))
          frame = np.asarray(canvas.draw())

          opaque = frame[..., 3] > 0
          print("--- rendered viridis ramp ---")
          print("opaque pixels:", int(np.count_nonzero(opaque)), "of", opaque.size)
          if opaque.any():
              xs = np.where(opaque.any(axis=0))[0]
              ys = np.where(opaque.any(axis=1))[0]
              row = (ys.min() + ys.max()) // 2
              left = frame[row, xs.min() + 1]
              right = frame[row, xs.max() - 1]
              print("left  (expect ~[ 68   2  84 255]):", left)
              print("right (expect ~[253 231  37 255]):", right)
              print("distinct rgb values:", len(np.unique(frame[opaque][:, :3], axis=0)))
              black = bool(left[:3].sum() == 0 and right[:3].sum() == 0)
              print("VERDICT:", "COLORMAP RETURNS BLACK" if black else "colormap OK")
          else:
              print("VERDICT: nothing rendered")
          PY

      - name: 🧪 Run Tests
        run: pytest --color=yes --cov --cov-report=xml --cov-report=term-missing

      - name: Coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    name: Deploy
    needs: test
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing on PyPi
      # see https://docs.pypi.org/trusted-publishers/
      id-token: write
      # This permission allows writing releases
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 👷 Build
        run: |
          python -m pip install build
          python -m build

      - name: 🚢 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: './dist/*'

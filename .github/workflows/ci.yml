name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  

# cancel in-progress runs that use the same workflow and branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-manifest:
    # check-manifest is a tool that checks that all files in version control are
    # included in the sdist (unless explicitly excluded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: pipx run check-manifest

  test:
    name: ${{ matrix.platform }} (${{ matrix.python-version }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        platform: [ubuntu-latest, macos-latest, windows-latest]

    env:
      # Pin Windows to Vulkan/lavapipe, matching the lavapipe setup ubuntu already
      # uses. The other two Windows backends are both broken for us: the Mesa
      # OpenGL adapter (installed by setup-headless-display-action, and preferred
      # by wgpu because D3D12/WARP reports device type "CPU") samples 1D float32
      # colormap textures as black, and D3D12 falls back to the FXC shader
      # compiler, which cannot compile the MIP shader's dynamic array indexing.
      # Empty elsewhere, which wgpu treats as unset.
      WGPU_BACKEND_TYPE: ${{ matrix.platform == 'windows-latest' && 'Vulkan' || '' }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up headless GUI
        uses: pyvista/setup-headless-display-action@v4
        with:
          qt: true

      - name: Install llvmpipe and lavapipe for offscreen canvas
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update -y -qq
          sudo apt install -y libegl1-mesa-dev libgl1-mesa-dri libxcb-xfixes0-dev mesa-vulkan-drivers

      # The windows runners ship no Vulkan driver (the loader is there, but finds
      # no ICD). This installs lavapipe and registers its ICD under
      # HKLM\SOFTWARE\Khronos\Vulkan\Drivers, so WGPU_BACKEND_TYPE=Vulkan resolves.
      - name: Install lavapipe for offscreen canvas
        if: matrix.platform == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_lavapipe: true
          stripdown: true
          cache: true

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache-dependency-path: "pyproject.toml"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install -U pip
          python -m pip install .[test,pyside,remote,anywidget]

      # The render tests skip themselves when no adapter resolves, so a backend
      # that fails to load would turn ~450 tests into a silent green. Fail here
      # instead, and log which adapter each platform actually picked.
      - name: Verify wgpu adapter
        shell: bash
        run: |
          python -c "from pygfx.renderers.wgpu import get_shared; print('adapter:', get_shared().device.adapter.summary)"

      - name: 🧪 Run Tests
        run: pytest --color=yes --cov --cov-report=xml --cov-report=term-missing

      - name: Coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    name: Deploy
    needs: test
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing on PyPi
      # see https://docs.pypi.org/trusted-publishers/
      id-token: write
      # This permission allows writing releases
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 👷 Build
        run: |
          python -m pip install build
          python -m build

      - name: 🚢 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: './dist/*'
